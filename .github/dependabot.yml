version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "02:00"
    open-pull-requests-limit: 10
    groups:
      prisma:
        patterns:
          - "prisma*"
          - "@prisma/*"
      linting-and-format:
        patterns:
          - "eslint*"
          - "prettier*"
          - "stylelint*"